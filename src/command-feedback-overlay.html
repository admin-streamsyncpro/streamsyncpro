<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stream Sync Pro LIVE Command Feedback Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(7, 13, 24, 0.9);
        --line: rgba(84, 208, 255, 0.22);
        --text: #eef6ff;
        --muted: #9fb8d6;
        --accent: #53dcff;
        --accent-2: #b266ff;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: transparent;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--text);
      }

      body {
        padding: 18px;
      }

      .feedback-card {
        width: min(560px, 100%);
        display: none;
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(7, 15, 30, 0.96) 0%, rgba(7, 13, 24, 0.92) 100%);
        border: 1px solid rgba(84, 208, 255, 0.14);
        box-shadow:
          0 18px 50px rgba(0, 0, 0, 0.38),
          0 0 0 1px rgba(178, 102, 255, 0.08),
          0 0 28px rgba(83, 220, 255, 0.12);
      }

      .feedback-card.visible {
        display: block;
      }

      .feedback-card::before {
        content: "";
        position: absolute;
        inset: 0;
        padding: 1px;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(83, 220, 255, 0.95), rgba(178, 102, 255, 0.88));
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .feedback-head {
        padding: 14px 18px 12px;
        border-bottom: 1px solid rgba(84, 208, 255, 0.1);
        background: linear-gradient(180deg, rgba(5, 9, 17, 0.98) 0%, rgba(15, 22, 37, 0.96) 100%);
      }

      .eyebrow {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #e070ff;
        font-weight: 700;
      }

      .feedback-body {
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .feedback-message {
        font-size: 27px;
        line-height: 1.22;
        font-weight: 800;
        letter-spacing: -0.035em;
      }

      .feedback-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        padding: 8px 11px;
        border-radius: 999px;
        font-size: 12px;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }

      .meta-pill.command {
        color: var(--accent);
      }

      .meta-pill.user {
        color: var(--text);
      }

      .feedback-empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <section id="feedback-card" class="feedback-card">
      <header class="feedback-head">
        <p class="eyebrow">Viewer Feedback</p>
      </header>
      <div class="feedback-body">
        <div id="feedback-message" class="feedback-message"></div>
        <div class="feedback-meta">
          <span id="feedback-command" class="meta-pill command"></span>
          <span id="feedback-user" class="meta-pill user"></span>
        </div>
      </div>
    </section>

    <script>
      const feedbackCard = document.getElementById("feedback-card");
      const feedbackMessage = document.getElementById("feedback-message");
      const feedbackCommand = document.getElementById("feedback-command");
      const feedbackUser = document.getElementById("feedback-user");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderState(state) {
        const message = String(state?.message ?? "").trim();
        const commandType = String(state?.commandType ?? "").trim();
        const username = String(state?.username ?? "").trim();
        const visibleUntil = state?.visibleUntil ? new Date(state.visibleUntil) : null;
        const shouldShow = message && visibleUntil instanceof Date && !Number.isNaN(visibleUntil.getTime()) && visibleUntil.getTime() > Date.now();

        feedbackCard.classList.toggle("visible", Boolean(shouldShow));
        if (!shouldShow) {
          return;
        }

        feedbackMessage.innerHTML = escapeHtml(message);
        feedbackCommand.textContent = commandType || "command";
        feedbackUser.textContent = username || "viewer";
      }

      async function loadFeedbackState() {
        try {
          const response = await fetch("/api/command-feedback-overlay-state", { cache: "no-store" });
          const result = await response.json();
          renderState(result?.state ?? {});
        } catch {
          renderState({});
        }
      }

      loadFeedbackState();
      window.setInterval(loadFeedbackState, 500);
    </script>
  </body>
</html>
